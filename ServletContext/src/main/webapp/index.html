<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Add IPL Team</title>
</head>
<body>

    <h2>Add IPL Team</h2>

    <form action="InsertTeam" method="post">

        <label>Team Name:</label><br>
        <input type="text" name="teamName"><br><br>

        <label>Trophies:</label><br>
        <input type="text" name="trophies"><br><br>

        <label>Best Player:</label><br>
        <input type="text" name="player"><br><br>

        <button type="submit">Add Team</button>

    </form>

</body>
</html>
