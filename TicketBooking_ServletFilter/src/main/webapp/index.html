<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ticket Booking</title>
</head>

<body>

<h1>Ticket Booking Form</h1>

<form action="TicketBookingServlet" method="post">

    <label for="uname">Enter Name:</label>
    <input type="text" id="uname" name="uname" required>
    <br><br>

    <label for="passenger">Enter Number of Passengers:</label>
    <input type="number" id="passenger" name="passenger" min="1" required>
    <br><br>

    <label for="starting">Enter Starting Point:</label>
    <input type="text" id="starting" name="starting" required>
    <br><br>

    <label for="destination">Enter Destination:</label>
    <input type="text" id="destination" name="destination" required>
    <br><br>

    <label for="transport">Select Mode of Transport:</label>

    <select id="transport" name="transport">
        <option value="Flight">Flight</option>
        <option value="Bus">Bus</option>
        <option value="Railway">Railway</option>
    </select>

    <br><br>

    <input type="submit" value="Book Ticket">

</form>

</body>
</html>
